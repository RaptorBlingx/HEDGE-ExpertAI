name: HEDGE-ExpertAI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check shared/ services/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e shared/
          pip install -r services/chat-intent/requirements.txt
          pip install -r services/discovery-ranking/requirements.txt
          pip install -r services/expert-recommend/requirements.txt
          pip install -r services/metadata-ingest/requirements.txt
          pip install -r services/gateway/requirements.txt
          pip install -r services/mock-api/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -v \
            --cov=services --cov=shared \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build all images
        run: |
          cp .env.example .env
          docker compose build
      - name: Validate compose config
        run: docker compose config --quiet
