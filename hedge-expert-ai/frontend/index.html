<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEDGE-ExpertAI — Chat Widget Demo</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f1f5f9;
      color: #1e293b;
    }
    .hero {
      max-width: 600px;
      margin: 80px auto;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #64748b; font-size: 1.1rem; }
    .hint {
      margin-top: 40px;
      padding: 16px;
      background: #dbeafe;
      border-radius: 8px;
      color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>HEDGE-IoT App Store</h1>
    <p>AI-Powered Discovery and Recommendation Assistant</p>
    <div class="hint">
      Click the chat bubble in the bottom-right corner to start exploring IoT applications.
    </div>
  </div>

  <!-- HEDGE-ExpertAI Widget -->
  <link rel="stylesheet" href="widget/hedge-expert-widget.css" />
  <script src="widget/hedge-expert-widget.js"></script>
  <script>
    new HedgeExpertWidget({
      apiUrl: window.location.origin,
      title: "HEDGE-ExpertAI",
      subtitle: "IoT App Discovery Assistant",
      primaryColor: "#2563eb",
    });
  </script>
</body>
</html>
