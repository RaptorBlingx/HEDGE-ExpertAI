x-common: &common
  restart: unless-stopped
  networks:
    - hedge-net

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  ollama:
    <<: *common
    image: ollama/ollama:latest
    container_name: hedge-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_KV_CACHE_TYPE: "q8_0"
      OLLAMA_FLASH_ATTENTION: "1"
    mem_limit: 4096m
    memswap_limit: 8192m
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  qdrant:
    <<: *common
    image: qdrant/qdrant:v1.9.7
    container_name: hedge-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    <<: *common
    image: redis:7-alpine
    container_name: hedge-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  mock-api:
    <<: *common
    build:
      context: .
      dockerfile: services/mock-api/Dockerfile
    container_name: hedge-mock-api
    ports:
      - "127.0.0.1:9000:9000"
    env_file: .env
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  discovery-ranking:
    <<: *common
    build:
      context: .
      dockerfile: services/discovery-ranking/Dockerfile
    container_name: hedge-discovery-ranking
    ports:
      - "127.0.0.1:8003:8003"
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  metadata-ingest:
    <<: *common
    build:
      context: .
      dockerfile: services/metadata-ingest/Dockerfile
    container_name: hedge-metadata-ingest
    ports:
      - "127.0.0.1:8004:8004"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      discovery-ranking:
        condition: service_healthy
      mock-api:
        condition: service_healthy
    mem_limit: 192m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  expert-recommend:
    <<: *common
    build:
      context: .
      dockerfile: services/expert-recommend/Dockerfile
    container_name: hedge-expert-recommend
    ports:
      - "127.0.0.1:8002:8002"
    env_file: .env
    depends_on:
      ollama:
        condition: service_healthy
      discovery-ranking:
        condition: service_healthy
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  chat-intent:
    <<: *common
    build:
      context: .
      dockerfile: services/chat-intent/Dockerfile
    container_name: hedge-chat-intent
    ports:
      - "127.0.0.1:8001:8001"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      expert-recommend:
        condition: service_healthy
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  gateway:
    <<: *common
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: hedge-gateway
    ports:
      - "127.0.0.1:8080:8000"
    env_file: .env
    depends_on:
      chat-intent:
        condition: service_healthy
      mock-api:
        condition: service_healthy
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Optional: RASA (disabled by default — too heavy for 5GB server)
  # Start with: docker compose --profile full up rasa
  # ---------------------------------------------------------------------------
  rasa:
    <<: *common
    build:
      context: .
      dockerfile: services/rasa/Dockerfile
    container_name: hedge-rasa
    ports:
      - "127.0.0.1:5005:5005"
    profiles:
      - full
      - rasa
    env_file: .env
    mem_limit: 1024m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5005/status')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Optional: TLS edge proxy (public 80/443 entrypoint)
  # Start with: docker compose --profile tls up nginx
  # ---------------------------------------------------------------------------
  nginx:
    <<: *common
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
    container_name: hedge-nginx
    profiles:
      - tls
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - nginx-certs:/etc/nginx/certs
    mem_limit: 64m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Optional: Keycloak auth stack
  # Start with: docker compose --profile auth up keycloak keycloak-db
  # ---------------------------------------------------------------------------
  keycloak-db:
    <<: *common
    image: postgres:16-alpine
    container_name: hedge-keycloak-db
    profiles:
      - auth
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  keycloak:
    <<: *common
    image: quay.io/keycloak/keycloak:25.0
    container_name: hedge-keycloak
    profiles:
      - auth
    command: ["start-dev", "--http-port=8080", "--proxy-headers=xforwarded", "--hostname-strict=false"]
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me}
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me}
      KC_PROXY_HEADERS: xforwarded
    depends_on:
      keycloak-db:
        condition: service_healthy
    mem_limit: 1024m

networks:
  hedge-net:
    driver: bridge

volumes:
  ollama-data:
  qdrant-data:
  redis-data:
  nginx-certs:
  keycloak-db-data:
